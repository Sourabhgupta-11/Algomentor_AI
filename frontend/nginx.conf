server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container/service.
    # In docker-compose this resolves to the "backend" service name.
    # On AWS, set this to your backend's App Runner URL instead, or run
    # frontend/backend as two separate services and set VITE_API_BASE_URL.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
