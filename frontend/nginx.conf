server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # NOTE: No /api/ proxy here. Frontend and backend are deployed as two
    # independent ECS Express Mode services, each with their own public URL.
    # The frontend talks to the backend directly via the VITE_API_BASE_URL
    # build-time variable baked into the static JS bundle (see .env).

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}